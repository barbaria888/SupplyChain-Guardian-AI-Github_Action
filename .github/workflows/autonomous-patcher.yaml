name: Autonomous Supply Chain Patcher

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "src/**"
      - ".github/workflows/autonomous-patcher.yaml"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_scan:
        description: "Force a scan even if no file changes detected"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  # Dogfooding workflow override: intentionally pinned to NVIDIA Nemotron.
  PROVIDER: "openai"
  OPENAI_MODEL: "deepseek/deepseek-v4-flash"
  OPENAI_ENDPOINT: "https://integrate.api.nvidia.com/v1/chat/completions"
  APP_IMAGE: "guardian-demo"
  PATCHED_TAG: "guardian-demo:patched"
  NAMESPACE: "default"
  APP_NAME: "guardian-demo"
  REMEDIATION_BRANCH: "auto-patcher/cve-remediation"
  PYTHON_VERSION: "3.12"
  KIND_VERSION: "v0.23.0"
  KUBECTL_VERSION: "v1.30.0"

jobs:
  # ========================================================================
  # JOB 1 — SCAN (@SecOps)
  # ========================================================================
  scan:
    name: "@SecOps — Vulnerability Scan"
    runs-on: ubuntu-latest
    outputs:
      has_vulnerabilities: ${{ steps.check.outputs.has_vulnerabilities }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight — validate Dockerfile and build context
        run: |
          chmod +x scripts/preflight_docker.sh
          bash scripts/preflight_docker.sh Dockerfile .

      - name: Build baseline image for scanning
        run: |
          docker build \
            --tag "${{ env.APP_IMAGE }}:baseline" \
            --label "guardian.scan=baseline" \
            --file Dockerfile \
            .

      - name: Run Trivy — Full image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.APP_IMAGE }}:baseline"
          format: "json"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Check for actionable CVEs
        id: check
        run: |
          CVE_COUNT=$(python3 - <<'EOF'
          import json, sys
          try:
              data = json.load(open("trivy-results.json"))
          except (FileNotFoundError, json.JSONDecodeError):
              print("0", end=""); sys.exit(0)
          count = sum(
              1 for r in data.get("Results", [])
              for v in (r.get("Vulnerabilities") or [])
              if v.get("Severity") in ("CRITICAL", "HIGH") and v.get("FixedVersion", "")
          )
          print(count, end="")
          EOF
          )
          echo "Actionable CVE count: $CVE_COUNT"
          if [[ "$CVE_COUNT" -gt 0 ]]; then
            echo "has_vulnerabilities=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vulnerabilities=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Trivy results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Check CVSS ≥ 9.0 escalation gate
        run: |
          CRITICAL_HIGH=$(python3 - <<'EOF'
          import json, sys
          try:
              data = json.load(open("trivy-results.json"))
          except Exception:
              sys.exit(0)
          for r in data.get("Results", []):
              for v in (r.get("Vulnerabilities") or []):
                  score = v.get("CVSS", {}).get("nvd", {}).get("V3Score", 0) or 0
                  if score >= 9.0:
                      print(f"ESCALATION: {v.get('VulnerabilityID')} CVSS={score}")
          EOF
          )
          if [[ -n "$CRITICAL_HIGH" ]]; then
            echo "::warning::CVSS ≥ 9.0 CVE detected — human review required:"
            echo "$CRITICAL_HIGH"
          fi

  # ========================================================================
  # JOB 2 — REMEDIATE (@AIPatcher)
  # ========================================================================
  remediate:
    name: "@AIPatcher — AI Remediation"
    runs-on: ubuntu-latest
    needs: scan
    if: needs.scan.outputs.has_vulnerabilities == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: Install patching engine dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download Trivy results from scan job
        uses: actions/download-artifact@v4
        with:
          name: trivy-results
          path: .

      - name: Validate NVIDIA API key secret is configured
        env:
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
        run: |
          if [[ "${{ env.PROVIDER }}" == "openai" && -z "$NVIDIA_NIM_API_KEY" ]]; then
            echo "::error::Missing required secret NVIDIA_NIM_API_KEY."
            echo "::error::Create it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Run AI Patching Engine
        env:
          PROVIDER: ${{ env.PROVIDER }}
          API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
          OPENAI_ENDPOINT: ${{ env.OPENAI_ENDPOINT }}
          LLM_TIMEOUT: "300"
          TRIVY_RESULTS: "trivy-results.json"
          DOCKERFILE_PATH: "Dockerfile"
          PATCHED_DOCKERFILE_PATH: "Dockerfile.patched"
          AUDIT_LOG_PATH: "patch_audit.log"
        run: |
          python scripts/remediate_cve.py
          echo "Patching engine completed."

      # -------------------------------------------------------------------
      # DOCKERFILE INTEGRITY GATE — reject patches missing critical instructions
      # -------------------------------------------------------------------
      - name: Dockerfile integrity gate
        id: integrity_gate
        run: |
          echo "Validating required instructions in Dockerfile.patched..."
          MISSING=""
          for INSTR in FROM WORKDIR COPY USER EXPOSE HEALTHCHECK CMD; do
            if ! grep -qiE "^[[:space:]]*${INSTR}[[:space:]]" Dockerfile.patched; then
              echo "::error::Missing required Dockerfile instruction: $INSTR"
              MISSING="$MISSING $INSTR"
            fi
          done
          if [[ -n "$MISSING" ]]; then
            echo "::error::Dockerfile integrity FAILED. Missing:$MISSING"
            cat Dockerfile.patched
            exit 1
          fi
          echo "integrity_passed=true" >> "$GITHUB_OUTPUT"
          echo "Dockerfile integrity gate PASSED."

      # -------------------------------------------------------------------
      # DOCKER BUILD GATE
      # -------------------------------------------------------------------
      - name: Preflight — validate patched Dockerfile
        run: |
          chmod +x scripts/preflight_docker.sh
          bash scripts/preflight_docker.sh Dockerfile.patched .

      - name: Docker build gate
        id: build_gate
        run: |
          if docker build -f Dockerfile.patched -t "${{ env.APP_IMAGE }}:smoke-test" .; then
            echo "build_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Docker build FAILED for Dockerfile.patched"
            cat Dockerfile.patched
            exit 1
          fi

      # -------------------------------------------------------------------
      # IMAGE VALIDATION GATES (USER existence, regression, WORKDIR, runtime)
      # Handled by scripts/validate_image.sh — see that file for gate details.
      # -------------------------------------------------------------------
      - name: Build baseline image for regression comparison
        run: |
          echo "Building baseline image from original Dockerfile for regression comparison..."
          docker build -t "${{ env.APP_IMAGE }}:baseline-check" .

      - name: Run image validation gates
        id: validation_gates
        env:
          PATCHED_IMAGE: "${{ env.APP_IMAGE }}:smoke-test"
          BASELINE_IMAGE: "${{ env.APP_IMAGE }}:baseline-check"
          HEALTHZ_PORT: "18080"
          HEALTHZ_PATH: "/healthz"
          STABILITY_SECONDS: "15"
          AUDIT_LOG: "patch_audit.log"
          FORENSICS_DIR: "runtime-failure-report"
        run: |
          chmod +x scripts/validate_image.sh
          bash scripts/validate_image.sh

      # -------------------------------------------------------------------
      # PROMOTE
      # -------------------------------------------------------------------
      - name: Promote patched Dockerfile
        run: |
          cp Dockerfile.patched Dockerfile
          echo "Dockerfile promoted."
          git diff --stat Dockerfile || true

      - name: Verify Dockerfile was modified
        run: |
          if git diff --quiet Dockerfile; then
            echo "::warning::Dockerfile was not changed by patching engine."
          else
            echo "Dockerfile modified:"
            git diff --stat Dockerfile
          fi

      - name: Upload patch audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-audit-log
          path: |
            patch_audit.log
            runtime-smoke-logs.txt
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload patched Dockerfile
        uses: actions/upload-artifact@v4
        with:
          name: patched-dockerfile
          path: Dockerfile
          retention-days: 90
          if-no-files-found: error

      - name: Upload runtime failure forensics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-failure-report
          path: runtime-failure-report/
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload rejected patch for forensic audit
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rejected-patch-forensic
          path: Dockerfile.patched
          retention-days: 90
          if-no-files-found: ignore

      - name: File escalation Issue on remediation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ESCALATION] AI Patcher Failed — Manual CVE Remediation Required`,
              body: [
                `## AI Patching Engine Failure`,
                ``,
                `The \`remediate\` job failed. Possible causes:`,
                `- LLM failed after 3 retries`,
                `- Dockerfile integrity gate rejected missing instructions`,
                `- Docker build failed on patched Dockerfile`,
                `- Docker inspect found missing CMD or WorkingDir`,
                `- Container exited during 15s runtime stability check`,
                `- /healthz health probe failed`,
                `- CMD or ENTRYPOINT changed unexpectedly (regression)`,
                ``,
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `### Required Actions`,
                `1. Review \`patch-audit-log\` artifact for LLM prompt/response.`,
                `2. Review \`rejected-patch-forensic\` artifact if present.`,
                `3. Manually patch the Dockerfile.`,
                `4. Close this issue once resolved.`,
                ``,
                `cc: @${context.repo.owner}`,
              ].join('\n'),
              labels: ['security', 'escalation', 'ai-patcher-failure'],
            });

  # ========================================================================
  # JOB 3 — VALIDATE (@SRE)
  # ========================================================================
  validate:
    name: "@SRE — KinD Cluster Validation"
    runs-on: ubuntu-latest
    needs: remediate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download patched Dockerfile
        uses: actions/download-artifact@v4
        with:
          name: patched-dockerfile
          path: .

      - name: Preflight — validate patched Dockerfile for KinD build
        run: |
          chmod +x scripts/preflight_docker.sh
          bash scripts/preflight_docker.sh Dockerfile .

      - name: Build patched Docker image
        run: |
          docker build \
            --tag "${{ env.PATCHED_TAG }}" \
            --label "guardian.scan=patched" \
            --label "guardian.run-id=${{ github.run_id }}" \
            --file Dockerfile \
            .

      - name: Set up KinD ${{ env.KIND_VERSION }}
        uses: helm/kind-action@v1.10.0
        with:
          version: ${{ env.KIND_VERSION }}
          cluster_name: guardian-test
          config: .kind/cluster-config.yaml
          wait: 120s

      - name: Load patched image into KinD
        run: |
          kind load docker-image "${{ env.PATCHED_TAG }}" --name guardian-test

      - name: Patch deployment manifest with new image tag
        run: |
          sed -i \
            "s|image: ${{ env.APP_IMAGE }}:.*|image: ${{ env.PATCHED_TAG }}|g" \
            k8s/deployment.yaml
          sed -i \
            's|imagePullPolicy:.*|imagePullPolicy: Never|g' \
            k8s/deployment.yaml
          grep -E "image:|imagePullPolicy:" k8s/deployment.yaml

      - name: Deploy to KinD cluster
        run: |
          kubectl apply -f k8s/
          kubectl get pods -A

      - name: Wait for deployment readiness
        run: |
          echo "Waiting for deployment (timeout: 120s)..."
          if ! kubectl wait \
            --for=condition=available \
            --timeout=120s \
            deployment/${{ env.APP_NAME }} \
            -n ${{ env.NAMESPACE }}; then
            echo "::error::Deployment did not become available within 120s"
            exit 1
          fi

      - name: Run integration test gates
        env:
          IMAGE_TAG: ${{ env.PATCHED_TAG }}
          NAMESPACE: ${{ env.NAMESPACE }}
          APP_NAME: ${{ env.APP_NAME }}
          WAIT_TIMEOUT: "90s"
        run: |
          chmod +x tests/integration/test_kind_deploy.sh
          bash tests/integration/test_kind_deploy.sh

      - name: Collect KinD diagnostics
        if: always()
        run: |
          DIAG="kind-diagnostics"
          mkdir -p "$DIAG"
          kubectl get pods -A -o wide > "$DIAG/all-pods.txt" 2>&1 || true
          kubectl describe pods -n ${{ env.NAMESPACE }} > "$DIAG/pod-describe.txt" 2>&1 || true
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp' > "$DIAG/events.txt" 2>&1 || true
          kubectl get deployments -n ${{ env.NAMESPACE }} -o wide > "$DIAG/deployments.txt" 2>&1 || true
          kubectl get replicasets -n ${{ env.NAMESPACE }} -o wide > "$DIAG/replicasets.txt" 2>&1 || true
          for pod in $(kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ env.APP_NAME }} \
            -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            kubectl logs "$pod" -n ${{ env.NAMESPACE }} > "$DIAG/logs-${pod}.txt" 2>&1 || true
            kubectl logs "$pod" -n ${{ env.NAMESPACE }} --previous > "$DIAG/logs-prev-${pod}.txt" 2>&1 || true
          done

      - name: Upload KinD test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-test-report
          path: |
            kind-test-report.txt
            kind-diagnostics/
          retention-days: 90
          if-no-files-found: ignore

      - name: File escalation Issue on validation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ESCALATION] KinD Validation Failed — Patched Image Did Not Start`,
              body: [
                `## KinD Integration Test Failure`,
                ``,
                `The patched image \`${process.env.PATCHED_TAG}\` failed validation in KinD.`,
                ``,
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `### Diagnostics Available`,
                `Download the \`kind-test-report\` artifact for:`,
                `- Pod status, descriptions, and logs`,
                `- Previous container logs`,
                `- Cluster events and replica set status`,
                ``,
                `### Required Actions`,
                `1. Download \`kind-test-report\` artifact for full diagnostics.`,
                `2. Verify the Dockerfile change proposed by the AI patcher.`,
                `3. Apply a corrected patch and close this issue.`,
                ``,
                `cc: @${context.repo.owner}`,
              ].join('\n'),
              labels: ['security', 'escalation', 'sre-failure'],
            });

  # ========================================================================
  # JOB 4 — VERIFY (@SecOps + @SRE)
  # ========================================================================
  verify:
    name: "@SecOps — Post-Patch Re-Scan Verification"
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download patched Dockerfile
        uses: actions/download-artifact@v4
        with:
          name: patched-dockerfile
          path: .

      - name: Preflight — validate Dockerfile for re-scan build
        run: |
          chmod +x scripts/preflight_docker.sh
          bash scripts/preflight_docker.sh Dockerfile .

      - name: Rebuild patched image for re-scan
        run: docker build --tag "${{ env.PATCHED_TAG }}" --file Dockerfile .

      - name: Re-scan patched image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.PATCHED_TAG }}"
          format: "json"
          output: "trivy-results-post-patch.json"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Upload post-patch scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-post-patch
          path: trivy-results-post-patch.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Confirm zero CRITICAL CVEs remain
        run: |
          REMAINING=$(python3 - <<'EOF'
          import json, sys
          try:
              data = json.load(open("trivy-results-post-patch.json"))
          except Exception:
              print("0", end=""); sys.exit(0)
          count = sum(
              1 for r in data.get("Results", [])
              for v in (r.get("Vulnerabilities") or [])
              if v.get("Severity") == "CRITICAL" and v.get("FixedVersion", "")
          )
          print(count, end="")
          EOF
          )
          echo "Remaining CRITICAL CVEs: $REMAINING"
          if [[ "$REMAINING" -gt 0 ]]; then
            echo "::error::Post-patch re-scan found $REMAINING remaining CRITICAL CVEs."
            exit 1
          fi
          echo "Verification PASSED — zero CRITICAL CVEs remain."

  # ========================================================================
  # JOB 5 — PULL REQUEST
  # ========================================================================
  pull-request:
    name: "Open Remediation Pull Request"
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download patched Dockerfile
        uses: actions/download-artifact@v4
        with:
          name: patched-dockerfile
          path: .

      - name: Download post-patch scan results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results-post-patch
          path: .

      - name: Generate PR body
        id: pr-body
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SCAN_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > pr-body.md << EOF
          ## 🔒 Automated CVE Remediation

          This pull request was generated autonomously by the **Supply Chain Guardian** pipeline.

          | Field | Value |
          |---|---|
          | **Workflow Run** | [View Run]($RUN_URL) |
          | **Scan Date** | $SCAN_DATE |
          | **Model Used** | \`${{ env.OPENAI_MODEL }}\` via NVIDIA NIM |
          | **Validation** | Ephemeral KinD cluster — all health gates passed |

          ### Evidence Chain

          All artifacts are attached to the workflow run:
          - 📋 \`trivy-results\` — Original vulnerability report
          - 🤖 \`patch-audit-log\` — Full LLM prompt and response audit trail
          - 🧪 \`kind-test-report\` — KinD cluster validation evidence + diagnostics
          - ✅ \`trivy-results-post-patch\` — Confirms zero CRITICAL CVEs remain

          ### Validation Gates Passed
          - ✅ Dockerfile integrity (FROM, WORKDIR, COPY, USER, EXPOSE, HEALTHCHECK, CMD)
          - ✅ Docker build compilation
          - ✅ Docker inspect (CMD + WorkingDir non-empty)
          - ✅ Runtime stability (container alive ≥15s)
          - ✅ Health probe (/healthz HTTP 200)
          - ✅ Runtime regression (CMD/ENTRYPOINT unchanged)
          - ✅ KinD cluster deployment
          - ✅ Post-patch Trivy re-scan

          ### Review Checklist (for human approver)

          - [ ] Confirm base image change is compatible with application dependencies
          - [ ] Verify no application behaviour changes are introduced
          - [ ] Review \`patch_audit.log\` to inspect the exact LLM prompt and response
          - [ ] Merge only after all checks above are complete

          > **@SecOps @SRE** — Please review before merging.
          EOF

      - name: Create or update remediation PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.REMEDIATION_BRANCH }}
          base: main
          title: "[SEC] Automated CVE Remediation — Supply Chain Guardian"
          body-path: pr-body.md
          commit-message: |
            fix(security): auto-patch CVEs via Supply Chain Guardian

            AI-generated Dockerfile patch validated in ephemeral KinD cluster.
            Zero CRITICAL CVEs confirmed by post-patch Trivy re-scan.
            Runtime validation: 15s stability + /healthz + CMD/ENTRYPOINT regression check.
            See patch_audit.log artifact for full LLM interaction trail.
          labels: |
            security
            automated-patch
            supply-chain-guardian
          delete-branch: false
          draft: false
