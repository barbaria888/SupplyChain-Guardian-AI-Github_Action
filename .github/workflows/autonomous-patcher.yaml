name: Autonomous Supply Chain Patcher

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "src/**"
      - ".github/workflows/autonomous-patcher.yaml"
  schedule:
    # Nightly at 02:00 UTC — catches newly published CVEs against unchanged images
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_scan:
        description: "Force a scan even if no file changes detected"
        required: false
        default: "false"

# ---------------------------------------------------------------------------
# Permissions — least-privilege per job
# ---------------------------------------------------------------------------
permissions:
  contents: write        # Required for peter-evans/create-pull-request
  pull-requests: write   # Required to open/update PRs
  issues: write          # Required for escalation issue filing

# ---------------------------------------------------------------------------
# Global defaults
# ---------------------------------------------------------------------------
env:
  OLLAMA_MODEL: "llama3.2:1b"
  APP_IMAGE: "guardian-demo"
  PATCHED_TAG: "guardian-demo:patched"
  NAMESPACE: "default"
  APP_NAME: "guardian-demo"
  REMEDIATION_BRANCH: "auto-patcher/cve-remediation"
  PYTHON_VERSION: "3.12"
  KIND_VERSION: "v0.23.0"
  KUBECTL_VERSION: "v1.30.0"

jobs:
  # ==========================================================================
  # JOB 1 — SCAN (@SecOps)
  # Purpose: Run Trivy and surface CRITICAL/HIGH CVEs as a structured artifact.
  # ==========================================================================
  scan:
    name: "@SecOps — Vulnerability Scan"
    runs-on: ubuntu-latest
    outputs:
      has_vulnerabilities: ${{ steps.check.outputs.has_vulnerabilities }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build baseline image for scanning
        run: |
          docker build \
            --tag "${{ env.APP_IMAGE }}:baseline" \
            --label "guardian.scan=baseline" \
            .

      - name: Run Trivy — Full image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.APP_IMAGE }}:baseline"
          format: "json"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"   # Don't fail here; let the check step decide
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Check for actionable CVEs
        id: check
        run: |
          # Count CRITICAL/HIGH CVEs that have a fixed version available.
          CVE_COUNT=$(python3 - <<'EOF'
          import json, sys
          try:
              data = json.load(open("trivy-results.json"))
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f"0", end="")
              sys.exit(0)
          count = sum(
              1 for r in data.get("Results", [])
              for v in (r.get("Vulnerabilities") or [])
              if v.get("Severity") in ("CRITICAL", "HIGH")
              and v.get("FixedVersion", "")
          )
          print(count, end="")
          EOF
          )
          echo "Actionable CVE count: $CVE_COUNT"
          if [[ "$CVE_COUNT" -gt 0 ]]; then
            echo "has_vulnerabilities=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vulnerabilities=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Trivy results artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 90
          if-no-files-found: error

      - name: Check CVSS ≥ 9.0 escalation gate
        # Any CVE with CVSS ≥ 9.0 requires human review — pipeline pauses here.
        run: |
          CRITICAL_HIGH=$(python3 - <<'EOF'
          import json, sys
          try:
              data = json.load(open("trivy-results.json"))
          except Exception:
              sys.exit(0)
          for r in data.get("Results", []):
              for v in (r.get("Vulnerabilities") or []):
                  score = v.get("CVSS", {}).get("nvd", {}).get("V3Score", 0) or 0
                  if score >= 9.0:
                      print(f"ESCALATION: {v.get('VulnerabilityID')} CVSS={score}")
          EOF
          )
          if [[ -n "$CRITICAL_HIGH" ]]; then
            echo "::warning::CVSS ≥ 9.0 CVE detected — human review required before auto-merge:"
            echo "$CRITICAL_HIGH"
          fi

  # ==========================================================================
  # JOB 2 — REMEDIATE (@AIPatcher)
  # Purpose: Install Ollama, run LLM patching engine, output patched Dockerfile.
  # ==========================================================================
  remediate:
    name: "@AIPatcher — AI Remediation"
    runs-on: ubuntu-latest
    needs: scan
    if: needs.scan.outputs.has_vulnerabilities == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install patching engine dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download Trivy results from scan job
        uses: actions/download-artifact@v4
        with:
          name: trivy-results
          path: .

      # -----------------------------------------------------------------------
      # Ollama: Install → Serve (background) → Health probe → Pull model
      # This sequence ensures the model server is fully listening before
      # the patching script makes any API calls.
      # -----------------------------------------------------------------------
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server (background)
        run: |
          ollama serve &
          echo "Waiting for Ollama server to be responsive..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434 > /dev/null 2>&1; then
              echo "Ollama ready after ${i}s."
              break
            fi
            sleep 1
          done
          # Hard fail if server never came up
          curl -sf http://localhost:11434 || { echo "Ollama failed to start."; exit 1; }

      - name: Pull model — llama3.2:1b (Q4_K_M, ~700MB)
        # Explicitly pulling the default 4-bit quantized tag to cap memory
        # consumption under 1GB, leaving headroom for KinD + Docker builds.
        run: |
          echo "Pulling ${{ env.OLLAMA_MODEL }}..."
          ollama pull "${{ env.OLLAMA_MODEL }}"
          echo "Model pull complete."
          ollama list

      - name: Run AI Patching Engine
        env:
          OLLAMA_HOST: "http://localhost:11434"
          OLLAMA_MODEL: ${{ env.OLLAMA_MODEL }}
          TRIVY_RESULTS: "trivy-results.json"
          DOCKERFILE_PATH: "Dockerfile"
          AUDIT_LOG_PATH: "patch_audit.log"
        run: |
          echo "Invoking remediate_cve.py..."
          python scripts/remediate_cve.py
          echo "Patching engine completed."

      - name: Verify Dockerfile was modified
        run: |
          if git diff --quiet Dockerfile; then
            echo "::warning::Dockerfile was not changed by the patching engine. CVE may still be present."
          else
            echo "Dockerfile has been modified by the AI patcher:"
            git diff --stat Dockerfile
          fi

      - name: Upload patch audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-audit-log
          path: patch_audit.log
          retention-days: 90
          if-no-files-found: warn

      - name: Upload patched Dockerfile
        uses: actions/upload-artifact@v4
        with:
          name: patched-dockerfile
          path: Dockerfile
          retention-days: 90
          if-no-files-found: error

      - name: File escalation Issue on LLM failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ESCALATION] AI Patcher Failed — Manual CVE Remediation Required`,
              body: [
                `## AI Patching Engine Failure`,
                ``,
                `The \`remediate\` job failed after ${process.env.MAX_RETRIES || 3} retries.`,
                ``,
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `### Required Actions`,
                `1. Review the \`patch-audit-log\` artifact for the raw LLM prompt and response.`,
                `2. Manually patch the Dockerfile to remediate the CVEs in \`trivy-results\` artifact.`,
                `3. Close this issue once the CVEs are resolved.`,
                ``,
                `cc: @${context.repo.owner}`,
              ].join('\n'),
              labels: ['security', 'escalation', 'ai-patcher-failure'],
            });

  # ==========================================================================
  # JOB 3 — VALIDATE (@SRE)
  # Purpose: Spin up KinD, deploy the patched image, run health gates.
  # ==========================================================================
  validate:
    name: "@SRE — KinD Cluster Validation"
    runs-on: ubuntu-latest
    needs: remediate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download patched Dockerfile
        uses: actions/download-artifact@v4
        with:
          name: patched-dockerfile
          path: .

      - name: Build patched Docker image
        run: |
          docker build \
            --tag "${{ env.PATCHED_TAG }}" \
            --label "guardian.scan=patched" \
            --label "guardian.run-id=${{ github.run_id }}" \
            .

      - name: Set up KinD ${{ env.KIND_VERSION }}
        uses: helm/kind-action@v1.10.0
        with:
          version: ${{ env.KIND_VERSION }}
          cluster_name: guardian-test
          config: .kind/cluster-config.yaml
          wait: 120s

      - name: Load patched image into KinD
        run: |
          echo "Loading ${{ env.PATCHED_TAG }} into KinD cluster..."
          kind load docker-image "${{ env.PATCHED_TAG }}" --name guardian-test
          echo "Image loaded successfully."

      - name: Patch deployment manifest with new image tag
        # Dynamic tag swap: replaces the generic image ref with the exact
        # patched tag so KinD uses the correct local image.
        run: |
          sed -i \
            "s|image: ${{ env.APP_IMAGE }}:latest|image: ${{ env.PATCHED_TAG }}|g" \
            k8s/deployment.yaml
          echo "Image tag in deployment.yaml updated to: ${{ env.PATCHED_TAG }}"
          grep "image:" k8s/deployment.yaml

      - name: Deploy to KinD cluster
        run: |
          kubectl apply -f k8s/
          echo "Manifests applied. Pods:"
          kubectl get pods -A

      - name: Wait for deployment readiness
        run: |
          echo "Waiting for deployment to become available (timeout: 90s)..."
          kubectl wait \
            --for=condition=available \
            --timeout=90s \
            deployment/${{ env.APP_NAME }} \
            -n ${{ env.NAMESPACE }}

      - name: Run integration test gates
        env:
          IMAGE_TAG: ${{ env.PATCHED_TAG }}
          NAMESPACE: ${{ env.NAMESPACE }}
          APP_NAME: ${{ env.APP_NAME }}
          WAIT_TIMEOUT: "90s"
        run: |
          chmod +x tests/integration/test_kind_deploy.sh
          bash tests/integration/test_kind_deploy.sh

      - name: Upload KinD test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-test-report
          path: kind-test-report.txt
          retention-days: 90
          if-no-files-found: warn

      - name: File escalation Issue on validation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ESCALATION] KinD Validation Failed — Patched Image Did Not Start`,
              body: [
                `## KinD Integration Test Failure`,
                ``,
                `The patched image \`${process.env.PATCHED_TAG}\` failed to reach \`Available\` state within 90 seconds in the ephemeral KinD cluster.`,
                ``,
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `### Possible Causes`,
                `- The AI patch introduced an incompatible base image change.`,
                `- A dependency in \`requirements.txt\` is not available for the new OS/arch.`,
                `- The new image failed a readiness probe.`,
                ``,
                `### Required Actions`,
                `1. Download the \`kind-test-report\` artifact for pod logs and events.`,
                `2. Manually verify the Dockerfile change proposed by the AI patcher.`,
                `3. Apply a corrected patch and close this issue.`,
                ``,
                `cc: @${context.repo.owner}`,
              ].join('\n'),
              labels: ['security', 'escalation', 'sre-failure'],
            });

  # ==========================================================================
  # JOB 4 — VERIFY (@SecOps + @SRE)
  # Purpose: Re-scan the patched image to confirm zero CRITICAL CVEs remain.
  # ==========================================================================
  verify:
    name: "@SecOps — Post-Patch Re-Scan Verification"
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download patched Dockerfile
        uses: actions/download-artifact@v4
        with:
          name: patched-dockerfile
          path: .

      - name: Rebuild patched image for re-scan
        run: |
          docker build \
            --tag "${{ env.PATCHED_TAG }}" \
            .

      - name: Re-scan patched image with Trivy
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          image-ref: "${{ env.PATCHED_TAG }}"
          format: "json"
          output: "trivy-results-post-patch.json"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"    # HARD FAIL if CVEs still present after patching
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Upload post-patch scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-post-patch
          path: trivy-results-post-patch.json
          retention-days: 90
          if-no-files-found: warn

      - name: Confirm zero CRITICAL CVEs remain
        run: |
          REMAINING=$(python3 - <<'EOF'
          import json, sys
          try:
              data = json.load(open("trivy-results-post-patch.json"))
          except Exception:
              print("0", end="")
              sys.exit(0)
          count = sum(
              1 for r in data.get("Results", [])
              for v in (r.get("Vulnerabilities") or [])
              if v.get("Severity") == "CRITICAL" and v.get("FixedVersion", "")
          )
          print(count, end="")
          EOF
          )
          echo "Remaining CRITICAL CVEs after patch: $REMAINING"
          if [[ "$REMAINING" -gt 0 ]]; then
            echo "::error::Post-patch re-scan found $REMAINING remaining CRITICAL CVEs. PR will not be opened."
            exit 1
          fi
          echo "Verification PASSED — zero CRITICAL CVEs remain."

  # ==========================================================================
  # JOB 5 — PULL REQUEST
  # Purpose: Open (or update) the remediation PR with full evidence.
  # Idempotent: updates existing branch instead of creating duplicates.
  # ==========================================================================
  pull-request:
    name: "Open Remediation Pull Request"
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed for peter-evans/create-pull-request
          fetch-depth: 0

      - name: Download patched Dockerfile
        uses: actions/download-artifact@v4
        with:
          name: patched-dockerfile
          path: .

      - name: Download post-patch scan results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results-post-patch
          path: .

      - name: Generate PR body
        id: pr-body
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SCAN_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > pr-body.md << EOF
          ## 🔒 Automated CVE Remediation

          This pull request was generated autonomously by the **Supply Chain Guardian** pipeline.

          | Field | Value |
          |---|---|
          | **Workflow Run** | [View Run]($RUN_URL) |
          | **Scan Date** | $SCAN_DATE |
          | **Model Used** | \`${{ env.OLLAMA_MODEL }}\` (CPU-only, zero external API calls) |
          | **Validation** | Ephemeral KinD cluster — all health gates passed |

          ### Evidence Chain

          All artifacts are attached to the workflow run:
          - 📋 \`trivy-results\` — Original vulnerability report that triggered this patch
          - 🤖 \`patch-audit-log\` — Full LLM prompt and raw response for audit review
          - 🧪 \`kind-test-report\` — KinD cluster deployment validation evidence
          - ✅ \`trivy-results-post-patch\` — Confirms zero CRITICAL CVEs remain after patch

          ### Review Checklist (for human approver)

          - [ ] Confirm base image change is compatible with application dependencies
          - [ ] Verify no application behaviour changes are introduced by the base OS upgrade
          - [ ] Review \`patch_audit.log\` to inspect the exact LLM prompt and response
          - [ ] Merge only after all checks above are complete

          > **@SecOps @SRE** — Please review before merging.
          EOF
          echo "PR body written."

      - name: Create or update remediation PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.REMEDIATION_BRANCH }}
          # Idempotent: same branch name means existing PR is updated, not duplicated
          base: main
          title: "[SEC] Automated CVE Remediation — Supply Chain Guardian"
          body-path: pr-body.md
          commit-message: |
            fix(security): auto-patch CVEs via Supply Chain Guardian

            AI-generated Dockerfile patch validated in ephemeral KinD cluster.
            Zero CRITICAL CVEs confirmed by post-patch Trivy re-scan.
            See patch_audit.log artifact for full LLM interaction trail.
          labels: |
            security
            automated-patch
            supply-chain-guardian
          delete-branch: false
          draft: false
