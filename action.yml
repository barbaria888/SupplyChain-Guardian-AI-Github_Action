# action.yml — Supply Chain Guardian AI
# ======================================
# Composite GitHub Action: Trivy scan → AI patch → smoke test → KinD → PR.
# Works with local Ollama or any OpenAI-compatible API (NVIDIA, DeepSeek, etc.)
#
# Usage:
#   - uses: barbaria888/SupplyChain-Guardian-AI@v1
#     with:
#       dockerfile: './Dockerfile'
#       provider: 'openai'
#       model: 'deepseek-ai/deepseek-v4-flash'
#       api-key: ${{ secrets.NVIDIA_NIM_API_KEY }}
#       openai-endpoint: 'https://integrate.api.nvidia.com/v1'

name: 'Supply Chain Guardian AI'
description: >
  Autonomous CVE detection & AI-driven Dockerfile remediation.
  Scans container images with Trivy, patches vulnerabilities using
  local Ollama or cloud LLMs, validates in KinD, and opens a PR with proof.

author: 'barbaria888'

branding:
  icon: 'shield'
  color: 'purple'

# ---------------------------------------------------------------------------
# Inputs
# ---------------------------------------------------------------------------
inputs:
  dockerfile:
    description: 'Path to the Dockerfile to scan and patch'
    required: false
    default: 'Dockerfile'

  image-ref:
    description: 'Pre-built image to scan (skips dockerfile build)'
    required: false
    default: ''

  severity:
    description: 'Trivy severity filter (comma-separated)'
    required: false
    default: 'CRITICAL,HIGH'

  provider:
    description: 'LLM provider: ollama (local) or openai (any compatible API)'
    required: false
    default: 'ollama'

  model:
    description: 'Model name (e.g., llama3.2:1b, deepseek-ai/deepseek-v4-flash)'
    required: false
    default: ''

  api-key:
    description: 'API key for cloud providers. Not needed for ollama.'
    required: false
    default: ''

  openai-endpoint:
    description: 'OpenAI-compatible base URL (e.g., https://integrate.api.nvidia.com/v1)'
    required: false
    default: 'https://integrate.api.nvidia.com/v1'

  trivy-version:
    description: 'Trivy version'
    required: false
    default: '0.55.0'

  kind-enabled:
    description: 'Run KinD cluster validation after smoke test'
    required: false
    default: 'true'

  kind-config:
    description: 'Path to KinD cluster config'
    required: false
    default: '.kind/cluster-config.yaml'

  k8s-manifests:
    description: 'Path to Kubernetes manifests directory'
    required: false
    default: 'k8s/'

  create-pr:
    description: 'Auto-create a Pull Request with the fix'
    required: false
    default: 'true'

  pr-branch:
    description: 'Branch name for the remediation PR'
    required: false
    default: 'auto-patcher/cve-remediation'

  pr-labels:
    description: 'Comma-separated PR labels'
    required: false
    default: 'security,automated-patch,supply-chain-guardian'

  fail-on-vulnerability:
    description: 'Fail if CVEs are found and cannot be patched'
    required: false
    default: 'true'

  llm-timeout:
    description: 'LLM inference timeout in seconds'
    required: false
    default: '300'

  policy-preset:
    description: 'Enforcement mode: strict (fail on any issue) or lax (warn and continue)'
    required: false
    default: 'strict'

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
outputs:
  vulnerabilities-found:
    description: 'Whether CRITICAL/HIGH CVEs were found'
    value: ${{ steps.scan.outputs.has_vulnerabilities }}

  patch-applied:
    description: 'Whether the AI generated a valid patch'
    value: ${{ steps.remediate.outputs.patch_applied }}

  smoke-test-passed:
    description: 'Whether the patched Dockerfile compiled and ran'
    value: ${{ steps.smoke-test.outputs.smoke_passed }}

  kind-validation-passed:
    description: 'Whether KinD deployment succeeded'
    value: ${{ steps.kind-validate.outputs.validation_passed }}

  pr-url:
    description: 'URL of the created Pull Request'
    value: ${{ steps.create-pr.outputs.pull-request-url }}

  trivy-results-path:
    description: 'Path to Trivy scan results'
    value: ${{ github.workspace }}/trivy-results.json

  audit-log-path:
    description: 'Path to the LLM audit log'
    value: ${{ github.workspace }}/patch_audit.log

# ---------------------------------------------------------------------------
# Composite Steps
# ---------------------------------------------------------------------------
runs:
  using: 'composite'
  steps:

    # ── 1. SETUP ──────────────────────────────────────────────
    - name: Stage requirements for pip caching
      shell: bash
      run: |
        CACHE_DIR="${{ github.workspace }}/.github/supply-chain-guardian"
        mkdir -p "$CACHE_DIR"
        cp "${{ github.action_path }}/scripts/requirements.txt" "$CACHE_DIR/requirements.txt"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: '.github/supply-chain-guardian/requirements.txt'

    - name: Install dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/scripts/requirements.txt"

    # ── 2. SCAN (@SecOps) ─────────────────────────────────────
    - name: Preflight — validate Dockerfile and build context
      if: inputs.image-ref == ''
      shell: bash
      env:
        POLICY_PRESET: ${{ inputs.policy-preset }}
      run: |
        DOCKERFILE="${{ github.workspace }}/${{ inputs.dockerfile }}"
        if [[ "${{ inputs.dockerfile }}" = /* ]]; then
          DOCKERFILE="${{ inputs.dockerfile }}"
        fi
        bash "${{ github.action_path }}/scripts/preflight_docker.sh" \
          "$DOCKERFILE" \
          "${{ github.workspace }}"

    - name: Build baseline image for scanning
      if: inputs.image-ref == ''
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        DOCKERFILE="${{ github.workspace }}/${{ inputs.dockerfile }}"
        if [[ "${{ inputs.dockerfile }}" = /* ]]; then
          DOCKERFILE="${{ inputs.dockerfile }}"
        fi
        docker build --tag "guardian-scan:baseline" --file "$DOCKERFILE" "${{ github.workspace }}"

    - name: Run Trivy vulnerability scan
      id: scan
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        IMAGE_REF="${{ inputs.image-ref }}"
        [[ -z "$IMAGE_REF" ]] && IMAGE_REF="guardian-scan:baseline"

        # Install Trivy if not available
        if ! command -v trivy &> /dev/null; then
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v${{ inputs.trivy-version }}
        fi

        TRIVY_OUT="${{ github.workspace }}/trivy-results.json"
        trivy image \
          --format json \
          --output "$TRIVY_OUT" \
          --severity "${{ inputs.severity }}" \
          --ignore-unfixed \
          "$IMAGE_REF" || true

        # Fallback if Trivy produced no file
        if [[ ! -f "$TRIVY_OUT" ]]; then
          echo '{"Results":[]}' > "$TRIVY_OUT"
        fi

        # Count actionable CVEs
        CVE_COUNT=$(python3 - <<'PYEOF'
        import json, sys
        try:
            data = json.load(open("${{ github.workspace }}/trivy-results.json"))
        except Exception:
            print("0", end=""); sys.exit(0)
        sev = {"CRITICAL", "HIGH"}
        count = sum(
            1 for r in data.get("Results", [])
            for v in (r.get("Vulnerabilities") or [])
            if v.get("Severity") in sev and v.get("FixedVersion", "")
        )
        print(count, end="")
        PYEOF
        )
        echo "Actionable CVE count: $CVE_COUNT"
        if [[ "$CVE_COUNT" -gt 0 ]]; then
          echo "has_vulnerabilities=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_vulnerabilities=false" >> "$GITHUB_OUTPUT"
        fi

    # ── 3. REMEDIATE (@AIPatcher) ─────────────────────────────
    - name: Install Ollama (if provider=ollama)
      if: steps.scan.outputs.has_vulnerabilities == 'true' && inputs.provider == 'ollama'
      shell: bash
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        for i in $(seq 1 30); do
          curl -sf http://localhost:11434 > /dev/null 2>&1 && break
          sleep 1
        done
        curl -sf http://localhost:11434 || { echo "Ollama failed to start."; exit 1; }
        MODEL="${{ inputs.model }}"
        [[ -z "$MODEL" ]] && MODEL="llama3.2:1b"
        ollama pull "$MODEL"

    - name: Run AI Patching Engine
      id: remediate
      if: steps.scan.outputs.has_vulnerabilities == 'true'
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        PROVIDER: ${{ inputs.provider }}
        API_KEY: ${{ inputs.api-key }}
        OLLAMA_HOST: "http://localhost:11434"
        OLLAMA_MODEL: ${{ inputs.model || 'qwen3:4b' }}
        OPENAI_MODEL: ${{ inputs.model || 'deepseek-ai/deepseek-v4-flash' }}
        OPENAI_ENDPOINT: ${{ inputs.openai-endpoint }}
        LLM_TIMEOUT: ${{ inputs.llm-timeout }}
        POLICY_PRESET: ${{ inputs.policy-preset }}
        TRIVY_RESULTS: ${{ github.workspace }}/trivy-results.json
        DOCKERFILE_PATH: ${{ inputs.dockerfile }}
        PATCHED_DOCKERFILE_PATH: ${{ github.workspace }}/Dockerfile.patched
        AUDIT_LOG_PATH: ${{ github.workspace }}/patch_audit.log
      run: |
        python "${{ github.action_path }}/scripts/remediate_cve.py"
        if [[ -f "${{ github.workspace }}/Dockerfile.patched" ]]; then
          echo "patch_applied=true" >> "$GITHUB_OUTPUT"
        else
          echo "::error::Patching engine ran but Dockerfile.patched was not created."
          echo "patch_applied=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    # ── 4. INTEGRITY GATE ─────────────────────────────────────
    - name: Dockerfile integrity gate
      if: steps.remediate.outputs.patch_applied == 'true'
      shell: bash
      run: |
        PATCHED="${{ github.workspace }}/Dockerfile.patched"
        MISSING=""
        for INSTR in FROM WORKDIR COPY USER EXPOSE HEALTHCHECK CMD; do
          if ! grep -qiE "^[[:space:]]*${INSTR}[[:space:]]" "$PATCHED"; then
            echo "::error::Missing instruction: $INSTR"
            MISSING="$MISSING $INSTR"
          fi
        done
        if [[ -n "$MISSING" ]]; then
          echo "::error::Integrity gate FAILED. Missing:$MISSING"
          cat "$PATCHED"
          exit 1
        fi
        echo "Dockerfile integrity gate PASSED."

    # ── 5. SMOKE TEST ─────────────────────────────────────────
    - name: Preflight — validate patched Dockerfile
      if: steps.remediate.outputs.patch_applied == 'true'
      shell: bash
      env:
        POLICY_PRESET: ${{ inputs.policy-preset }}
      run: |
        bash "${{ github.action_path }}/scripts/preflight_docker.sh" \
          "${{ github.workspace }}/Dockerfile.patched" \
          "${{ github.workspace }}"

    - name: Smoke test — build + runtime validation
      id: smoke-test
      if: steps.remediate.outputs.patch_applied == 'true'
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        PATCHED="${{ github.workspace }}/Dockerfile.patched"
        SMOKE_IMAGE="guardian-scan:smoke-test"

        # Build gate
        if ! docker build -f "$PATCHED" -t "$SMOKE_IMAGE" "${{ github.workspace }}"; then
          echo "::error::Smoke test FAILED — build errors"
          echo "smoke_passed=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        # Inspect CMD and WORKDIR
        IMG_CMD=$(docker inspect "$SMOKE_IMAGE" --format='{{json .Config.Cmd}}')
        IMG_WORKDIR=$(docker inspect "$SMOKE_IMAGE" --format='{{json .Config.WorkingDir}}')
        echo "CMD=$IMG_CMD  WORKDIR=$IMG_WORKDIR"

        if [[ "$IMG_CMD" == "null" || "$IMG_CMD" == "[]" || -z "$IMG_CMD" ]]; then
          echo "::error::CMD is empty — container will exit immediately"
          echo "smoke_passed=false" >> "$GITHUB_OUTPUT"; exit 1
        fi
        if [[ "$IMG_WORKDIR" == '""' || -z "$IMG_WORKDIR" ]]; then
          echo "::error::WORKDIR is empty"
          echo "smoke_passed=false" >> "$GITHUB_OUTPUT"; exit 1
        fi

        # Runtime stability check (15s)
        CONTAINER="guardian-smoke-$$"
        docker run -d --name "$CONTAINER" -p 18080:8080 "$SMOKE_IMAGE"
        sleep 15

        RUNNING=$(docker inspect "$CONTAINER" --format='{{.State.Running}}' 2>/dev/null || echo "false")
        if [[ "$RUNNING" != "true" ]]; then
          EXIT_CODE=$(docker inspect "$CONTAINER" --format='{{.State.ExitCode}}' 2>/dev/null || echo "-1")
          echo "::error::Container exited during stability window (exit=$EXIT_CODE)"
          docker logs "$CONTAINER" 2>&1 || true
          docker rm -f "$CONTAINER" 2>/dev/null || true
          echo "smoke_passed=false" >> "$GITHUB_OUTPUT"; exit 1
        fi

        # Health probe
        HEALTH_OK=false
        for i in $(seq 1 5); do
          curl -sf http://localhost:18080/healthz > /dev/null 2>&1 && { HEALTH_OK=true; break; }
          sleep 2
        done
        docker rm -f "$CONTAINER" 2>/dev/null || true

        if [[ "$HEALTH_OK" != "true" ]]; then
          echo "::error::/healthz probe failed"
          echo "smoke_passed=false" >> "$GITHUB_OUTPUT"; exit 1
        fi

        echo "Smoke test PASSED — build + runtime + health probe verified."
        echo "smoke_passed=true" >> "$GITHUB_OUTPUT"
        cp "$PATCHED" "${{ inputs.dockerfile }}"

    # ── 6. KIND VALIDATION (@SRE) ─────────────────────────────
    - name: Set up KinD cluster
      if: steps.smoke-test.outputs.smoke_passed == 'true' && inputs.kind-enabled == 'true'
      uses: helm/kind-action@v1.10.0
      with:
        cluster_name: guardian-test
        config: ${{ inputs.kind-config }}
        wait: 120s

    - name: Deploy patched image to KinD
      id: kind-validate
      if: steps.smoke-test.outputs.smoke_passed == 'true' && inputs.kind-enabled == 'true'
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        PATCHED_TAG="guardian-scan:patched"
        docker tag "guardian-scan:smoke-test" "$PATCHED_TAG"
        kind load docker-image "$PATCHED_TAG" --name guardian-test

        # Swap image refs in manifests
        find ${{ inputs.k8s-manifests }} -name '*.yaml' -o -name '*.yml' | while read f; do
          sed -i "s|image:.*guardian.*|image: $PATCHED_TAG|g" "$f" || true
          sed -i 's|imagePullPolicy:.*|imagePullPolicy: Never|g' "$f" || true
        done

        kubectl apply -f ${{ inputs.k8s-manifests }}
        echo "Waiting for deployment readiness (120s)..."
        if kubectl wait --for=condition=available --timeout=120s deployment -l managed-by=supply-chain-guardian -n default 2>/dev/null || \
           kubectl wait --for=condition=available --timeout=120s deployment --all -n default; then
          echo "validation_passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "::error::KinD validation FAILED"
          # Collect diagnostics
          DIAG="${{ github.workspace }}/kind-diagnostics"
          mkdir -p "$DIAG"
          kubectl get pods -A -o wide > "$DIAG/all-pods.txt" 2>&1 || true
          kubectl describe pods -n default > "$DIAG/pod-describe.txt" 2>&1 || true
          kubectl get events -n default --sort-by='.lastTimestamp' > "$DIAG/events.txt" 2>&1 || true
          for pod in $(kubectl get pods -n default -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            kubectl logs "$pod" -n default > "$DIAG/logs-${pod}.txt" 2>&1 || true
          done
          exit 1
        fi

    # ── 7. ARTIFACTS ──────────────────────────────────────────
    - name: Upload scan and audit artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: supply-chain-guardian-artifacts
        path: |
          ${{ github.workspace }}/trivy-results.json
          ${{ github.workspace }}/patch_audit.log
          ${{ github.workspace }}/Dockerfile.patched
        retention-days: 90
        if-no-files-found: ignore

    - name: Upload KinD diagnostics (on failure)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kind-diagnostics
        path: ${{ github.workspace }}/kind-diagnostics/
        retention-days: 90
        if-no-files-found: ignore

    # ── 8. PULL REQUEST ───────────────────────────────────────
    - name: Create Pull Request
      id: create-pr
      if: steps.smoke-test.outputs.smoke_passed == 'true' && inputs.create-pr == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ github.token }}
        branch: ${{ inputs.pr-branch }}
        title: 'fix(security): AI-remediated CVE patch'
        body: |
          ## 🛡️ Supply Chain Guardian — Automated Patch

          This PR was generated by the **Supply Chain Guardian AI** pipeline.

          ### Evidence Chain
          - ✅ Trivy scan detected CRITICAL/HIGH CVEs
          - ✅ AI patching engine generated a fix
          - ✅ `docker build` smoke test passed
          - ✅ Runtime stability check passed (15s)
          - ✅ Health probe verified

          ### Artifacts
          Download the `supply-chain-guardian-artifacts` from this workflow run for:
          - `trivy-results.json` — original scan report
          - `patch_audit.log` — full LLM prompt + response audit trail
          - `Dockerfile.patched` — the generated patch

          > **Review carefully before merging.** AI-generated patches should always
          > be reviewed by a human engineer.
        labels: ${{ inputs.pr-labels }}
        commit-message: 'fix(security): AI-remediated Dockerfile CVE patch'
